name: eval

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Always-on gate: deterministic metric + gate unit tests. No API key, no
  # corpus, no index needed — if the metric math or gate logic breaks, CI is red.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install pytest
      - name: Run metric + gate tests
        run: python -m pytest tests/ -q

  # Full golden-set evaluation against a live LLM. Runs only when the
  # OPENROUTER_API_KEY secret is configured (skips cleanly on forks/PRs without
  # it). Requires a prebuilt index committed or rebuilt in a prior step.
  golden-eval:
    runs-on: ubuntu-latest
    needs: unit
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run golden-set eval + regression gate
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "OPENROUTER_API_KEY not set — skipping full golden eval."
            exit 0
          fi
          if [ ! -f storage/vectors/pdf/index.json ]; then
            echo "No prebuilt index — skipping full golden eval."
            echo "(Build the index in a prior workflow step or restore from cache.)"
            exit 0
          fi
          python -m eval.run_eval
